<!DOCTYPE html>
<html>
<head>
  <title>Heavy Back Trap</title>
</head>
<body>

<h2>Back Button Trap Active</h2>
<p>Try pressing browser back.</p>

<script>
  function trap() {
    history.pushState({}, "", location.href);
  }

  // Push multiple entries
  for (let i = 0; i < 20; i++) {
    trap();
  }

  window.addEventListener("popstate", function () {
    trap();
  });
</script>

</body>
</html>
