<!DOCTYPE html>
<html>
<head>
  <title>Back Button Trap Test</title>
</head>
<body>

<h2>Test Page</h2>
<button onclick="goBack()">Special Back Button</button>

<script>
  // Push fake history state
  history.pushState(null, null, location.href);

  window.onpopstate = function () {
    history.pushState(null, null, location.href);
    alert("Please use the special back button!");
  };

  function goBack() {
    window.location.href = "https://adityasingh701.github.io/flex/";
  }
</script>

</body>
</html>
