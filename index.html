<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Experience</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

#startBtn{
padding:15px 30px;
font-size:20px;
background:red;
border:none;
color:white;
cursor:pointer;
z-index:10;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
opacity:0;
visibility:hidden;
transition:0.4s;
z-index:50;
}

.overlay.show{
opacity:1;
visibility:visible;
}

.overlay button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
background:white;
color:black;
border:none;
cursor:pointer;
}

#overlay1{ background:rgba(0,0,0,0.95); }
#overlay2{ background:rgba(30,0,0,0.95); }
#overlay3{ background:rgba(0,0,40,0.95); }
#overlay4{ background:rgba(0,0,0,0.95); }
#overlay5{ background:rgba(30,0,0,0.95); }
#overlay6{ background:rgba(0,0,40,0.95); }
  #overlay7{ background:rgba(0,0,0,0.95); }
#overlay8{ background:rgba(30,0,0,0.95); }
#overlay9{ background:rgba(0,0,40,0.95); }
  #overlay10{ background:rgba(0,0,0,0.95); }

  
.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:100;
}

@keyframes shake {
0% { transform: translate(2px, 2px); }
25% { transform: translate(-2px, -3px); }
50% { transform: translate(3px, 2px); }
75% { transform: translate(-3px, 1px); }
100% { transform: translate(2px, -2px); }
}

.shake{
animation:shake 0.2s infinite;
}
</style>
</head>
<body>

<button id="startBtn" onclick="startExperience()">Start</button>

<div id="overlay1" class="overlay">
<h1>1</h1>
<button onclick="nextLayer(1)">Next</button>
</div>

<div id="overlay2" class="overlay">
<h1>2</h1>
<button onclick="nextLayer(2)">Next</button>
</div>

  <div id="overlay3" class="overlay">
<h1>3</h1>
<button onclick="nextLayer(3)">Next</button>
</div>

  <div id="overlay4" class="overlay">
<h1>4</h1>
<button onclick="nextLayer(4)">Next</button>
</div>

  <div id="overlay5" class="overlay">
<h1>5</h1>
<button onclick="nextLayer(5)">Next</button>
</div>

  <div id="overlay6" class="overlay">
<h1>6</h1>
<button onclick="nextLayer(6)">Next</button>
</div>

  <div id="overlay7" class="overlay">
<h1>7</h1>
<button onclick="nextLayer(7)">Next</button>
</div>

  <div id="overlay8" class="overlay">
<h1>8</h1>
<button onclick="nextLayer(8)">Next</button>
</div>

  <div id="overlay9" class="overlay">
<h1>9</h1>
<button onclick="nextLayer(9)"Dont Press </button>
</div>

  
<div id="overlay10" class="overlay"
  <h1>10</h1>
<button onclick="exitAll()"ㅤ</button>
</div>





<div class="flash" id="flash"></div>

<audio id="bgMusic" src="tft.mp3" loop></audio>

<script>

let currentLayer = 0;
let musicStarted = false;

/* Start */
function startExperience(){
document.getElementById("startBtn").style.display="none";
enterFullscreen();
activateLayer(1);
startEffects();
}

/* Activate Layer */
function activateLayer(layer){
currentLayer = layer;
document.getElementById("overlay"+layer).classList.add("show");
history.pushState({layer:layer},"","#layer"+layer);

/* 🔥 MUSIC START ONLY AT LAST LAYER */
if(layer === 8 && !musicStarted){
let audio = document.getElementById("bgMusic");
audio.play();
musicStarted = true;
}
}

/* Next */
function nextLayer(current){
document.getElementById("overlay"+current).classList.remove("show");
activateLayer(current+1);
}

/* Back Handling */
window.addEventListener("popstate",function(){

if(currentLayer>0){
document.getElementById("overlay"+currentLayer).classList.remove("show");

document.body.classList.add("shake");
setTimeout(()=>{document.body.classList.remove("shake");},300);

currentLayer--;
}

/* 🔥 NOTICE:
Music NOT stopped here.
Even if user returns to first page, it continues playing.
*/

});

/* Exit Button Only Stops Music */
function exitAll(){

for(let i=1;i<=8;i++){
let el=document.getElementById("overlay"+i);
if(el) el.classList.remove("show");
}

currentLayer=0;

let audio=document.getElementById("bgMusic");
audio.pause();
audio.currentTime=0;
musicStarted=false;

if(document.fullscreenElement){
document.exitFullscreen();
}

document.getElementById("startBtn").style.display="block";
}

/* Fullscreen */
function enterFullscreen(){
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}
}

/* Effects */
function startEffects(){

setInterval(()=>{
let colors=["red","blue","purple","green","yellow","cyan","orange"];
document.body.style.background=colors[Math.floor(Math.random()*colors.length)];
},150);

setInterval(()=>{
let flash=document.getElementById("flash");
flash.style.opacity="0.8";
setTimeout(()=>{flash.style.opacity="0";},100);
},1000);

}

</script>

</body>
</html>
