<!DOCTYPE html>
<html>
<head>
  <title>Advanced Back Trap Test</title>
</head>
<body>

<h2>Advanced Trap Active</h2>
<p>Press browser back and observe.</p>

<script>
  let count = 0;

  function pushNewState() {
    count++;
    history.pushState({page: count}, "", "?step=" + count);
  }

  // Delay flood
  setTimeout(() => {
    for (let i = 0; i < 15; i++) {
      pushNewState();
    }
  }, 500);

  window.addEventListener("popstate", function () {
    pushNewState();
  });
</script>

</body>
</html>
