<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXTREME STACK MODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:black;
color:white;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
transition:0.05s;
}

#startBtn{
padding:20px 40px;
font-size:22px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
opacity:0;
visibility:hidden;
}

.overlay.show{
opacity:1;
visibility:visible;
}

.flash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:999;
}

.shake{
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(4px,4px);}
25%{transform:translate(-4px,-5px);}
50%{transform:translate(5px,4px);}
75%{transform:translate(-5px,3px);}
100%{transform:translate(4px,-4px);}
}
</style>
</head>
<body>

<button id="startBtn" onclick="startExperience()">START</button>

<!-- 9 overlays -->
<div id="overlay1" class="overlay"></div>
<div id="overlay2" class="overlay"></div>
<div id="overlay3" class="overlay"></div>
<div id="overlay4" class="overlay"></div>
<div id="overlay5" class="overlay"></div>
<div id="overlay6" class="overlay"></div>
<div id="overlay7" class="overlay"></div>
<div id="overlay8" class="overlay"></div>
<div id="overlay9" class="overlay"><h1>FINAL MODE</h1></div>

<div class="flash" id="flash"></div>

<audio id="bgMusic" src="tft.mp3" loop></audio>

<script>

let currentLayer=0;
let musicStarted=false;

let audio=document.getElementById("bgMusic");
let audioCtx, source, gainNode;

/* START */
function startExperience(){
document.getElementById("startBtn").style.display="none";
enterFullscreen();

/* Build full history stack 1-9 */
for(let i=1;i<=9;i++){
history.pushState({layer:i},"","#layer"+i);
currentLayer=i;
}

/* Show only 9 */
document.getElementById("overlay9").classList.add("show");

startMusic();
startExtremeEffects();
}

/* BACK HANDLER */
window.addEventListener("popstate",function(){

if(currentLayer>0){
document.getElementById("overlay"+currentLayer).classList.remove("show");
currentLayer--;
}

/* Volume spike */
if(musicStarted && gainNode.gain.value<10){
gainNode.gain.value+=2;
}

});

/* MUSIC */
function startMusic(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);
gainNode=audioCtx.createGain();

gainNode.gain.value=3;

source.connect(gainNode);
gainNode.connect(audioCtx.destination);

audio.play();
musicStarted=true;
}

/* EXTREME EFFECTS */
function startExtremeEffects(){

document.body.classList.add("shake");

/* Ultra RGB flicker */
setInterval(()=>{
let r=Math.random()*255;
let g=Math.random()*255;
let b=Math.random()*255;
document.body.style.background=`rgb(${r},${g},${b})`;
},40);

/* Flash burst */
setInterval(()=>{
let flash=document.getElementById("flash");
flash.style.opacity="1";
setTimeout(()=>{flash.style.opacity="0";},40);
},400);

/* Random invert glitch */
setInterval(()=>{
document.body.style.filter="invert(1)";
setTimeout(()=>{document.body.style.filter="invert(0)";},80);
},2000);

/* Vibration */
if(navigator.vibrate){
setInterval(()=>{
navigator.vibrate([300,100,300,100,500]);
},1200);
}

}

/* FULLSCREEN */
function enterFullscreen(){
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}
}

</script>
</body>
</html>
